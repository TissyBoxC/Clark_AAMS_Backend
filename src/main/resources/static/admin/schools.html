<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学校适配器管理</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --line: #d9dee7;
      --text: #20242c;
      --muted: #667085;
      --primary: #1769aa;
      --primary-hover: #0f568d;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 20px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
    }

    section {
      min-width: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 650;
    }

    .panel-body {
      padding: 14px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      color: var(--text);
      background: var(--surface);
      font: inherit;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.45;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
    }

    .check input {
      width: 16px;
      height: 16px;
    }

    button,
    a.button {
      border: 1px solid var(--primary);
      border-radius: 6px;
      padding: 9px 12px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover,
    a.button:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    button.secondary,
    a.secondary {
      background: var(--surface);
      color: var(--primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      background: #fbfcfd;
    }

    td:nth-child(2),
    td:nth-child(5) {
      white-space: normal;
    }

    .status {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      background: #fbfcfd;
    }

    .status.error {
      border-color: #f1b9b4;
      color: var(--danger);
      background: #fff7f6;
    }

    code {
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }

      .grid-two,
      .checks {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
<header>
  <div class="bar">
    <h1>学校适配器管理</h1>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <a class="button secondary" href="/admin">管理首页</a>
      <a class="button secondary" href="/admin/versions.html">版本管理</a>
      <a class="button secondary" href="/docs/school-importer-development.md" target="_blank">开发文档</a>
    </div>
  </div>
</header>

<main>
  <section class="panel">
    <div class="panel-title">
      <span>当前学校</span>
      <button class="secondary" type="button" id="refreshSchools">刷新</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>名称</th>
          <th>简称</th>
          <th>教务导入</th>
          <th>登录地址</th>
          <th>版本</th>
        </tr>
        </thead>
        <tbody id="schoolRows">
        <tr><td colspan="6">加载中</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <aside class="panel">
    <div class="panel-title">生成学校包</div>
    <div class="panel-body">
      <form id="scaffoldForm">
        <div class="grid-two">
          <label>
            学校 ID
            <input name="schoolId" required pattern="[a-z][a-z0-9_]*" placeholder="njupt">
          </label>
          <label>
            类名前缀
            <input name="classPrefix" placeholder="Njupt">
          </label>
        </div>

        <label>
          学校名称
          <input name="name" required placeholder="南京邮电大学">
        </label>

        <div class="grid-two">
          <label>
            学校简称
            <input name="shortName" required placeholder="NJUPT">
          </label>
          <label>
            登录模式
            <select name="loginMode">
              <option value="webview">webview</option>
            </select>
          </label>
        </div>

        <label>
          登录地址
          <input name="loginUrl" required placeholder="https://example.edu.cn/login">
        </label>

        <label>
          成功 URL 规则
          <textarea name="successUrlPatterns" required placeholder="https://example.edu.cn/main*"></textarea>
        </label>

        <div class="checks">
          <label class="check"><input type="checkbox" name="enabled" checked>启用</label>
          <label class="check"><input type="checkbox" name="academicImport" checked>教务导入</label>
          <label class="check"><input type="checkbox" name="imageRecognition">图片识别</label>
          <label class="check"><input type="checkbox" name="overwrite">覆盖文件</label>
        </div>

        <button type="submit">生成</button>
      </form>
      <div style="height: 12px"></div>
      <div id="status" class="status">等待提交</div>
    </div>
  </aside>
</main>

<script>
  const rows = document.querySelector('#schoolRows');
  const statusBox = document.querySelector('#status');
  const form = document.querySelector('#scaffoldForm');

  document.querySelector('#refreshSchools').addEventListener('click', loadSchools);
  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    setStatus('正在生成');
    const data = new FormData(form);
    const payload = {
      schoolId: data.get('schoolId'),
      classPrefix: data.get('classPrefix'),
      name: data.get('name'),
      shortName: data.get('shortName'),
      enabled: data.get('enabled') === 'on',
      academicImport: data.get('academicImport') === 'on',
      imageRecognition: data.get('imageRecognition') === 'on',
      loginMode: data.get('loginMode'),
      loginUrl: data.get('loginUrl'),
      successUrlPatterns: String(data.get('successUrlPatterns') || '')
        .split(/\r?\n/)
        .map((value) => value.trim())
        .filter(Boolean),
      overwrite: data.get('overwrite') === 'on'
    };

    try {
      const response = await fetch('/api/v1/admin/school-scaffold', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      if (!response.ok || result.code !== 0) {
        throw new Error(result.message || `HTTP ${response.status}`);
      }
      setStatus(`已生成 ${result.data.packageName}\n\n${result.data.createdFiles.join('\n')}`);
      await loadSchools();
    } catch (error) {
      setStatus(error.message, true);
    }
  });

  async function loadSchools() {
    rows.innerHTML = '<tr><td colspan="6">加载中</td></tr>';
    try {
      const response = await fetch('/api/v1/schools');
      const result = await response.json();
      if (!response.ok || result.code !== 0) {
        throw new Error(result.message || `HTTP ${response.status}`);
      }
      if (result.data.length === 0) {
        rows.innerHTML = '<tr><td colspan="6">暂无学校</td></tr>';
        return;
      }
      rows.innerHTML = result.data.map((school) => `
        <tr>
          <td><code>${escapeHtml(school.id)}</code></td>
          <td>${escapeHtml(school.name)}</td>
          <td>${escapeHtml(school.shortName)}</td>
          <td>${school.capabilities.academicImport ? '是' : '否'}</td>
          <td>${escapeHtml(school.login.loginUrl)}</td>
          <td>${school.version}</td>
        </tr>
      `).join('');
    } catch (error) {
      rows.innerHTML = `<tr><td colspan="6">${escapeHtml(error.message)}</td></tr>`;
    }
  }

  function setStatus(message, error = false) {
    statusBox.textContent = message;
    statusBox.classList.toggle('error', error);
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  loadSchools();
</script>
</body>
</html>
